

# SonarCloud Configuration for Resume Builder Project

# Project identification
# Replace these values with your actual SonarCloud project and organization keys
sonar.projectKey=Resume-Builder
sonar.organization=Pranayd555

# Project metadata
sonar.projectName=Resume Builder
sonar.projectVersion=1.0.0

# Source code paths
sonar.sources=backend,resume-builder/src
sonar.tests=backend/__tests__,resume-builder/src/__tests__

# Language-specific settings
sonar.language=js
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,resume-builder/coverage/lcov.info

# Exclude patterns
sonar.exclusions=**/node_modules/**,**/coverage/**,**/build/**,**/dist/**,**/.git/**,**/scripts/**,**/thumbnails/**,**/uploads/**

# Test coverage settings
sonar.coverage.exclusions=**/node_modules/**,**/coverage/**,**/build/**,**/dist/**,**/scripts/**,**/*.test.js,**/*.spec.js

# Quality gate settings
sonar.qualitygate.wait=false

# Additional settings
sonar.sourceEncoding=UTF-8 