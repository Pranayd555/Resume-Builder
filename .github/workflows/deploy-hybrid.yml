name: Deploy to Render (Backend) and Vercel (Frontend)

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

env:
  NODE_VERSION: '18'

jobs:
  # Deploy Backend to Render
  deploy-backend-render:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install backend dependencies
      working-directory: ./backend
      run: npm ci

    - name: Run backend tests
      working-directory: ./backend
      env:
        NODE_ENV: test
        MONGODB_URI: ${{ secrets.TEST_MONGODB_URI }}
        JWT_SECRET: test-secret
        JWT_REFRESH_SECRET: test-refresh-secret
      run: npm test

    - name: Deploy to Render
      uses: johnbeynon/render-deploy-action@v1.0.0
      with:
        service-id: ${{ secrets.RENDER_SERVICE_ID }}
        api-key: ${{ secrets.RENDER_API_KEY }}
        wait-for-success: true

  # Deploy Frontend to Vercel
  deploy-frontend-vercel:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install frontend dependencies
      working-directory: ./resume-builder
      run: npm ci

    - name: Run frontend tests
      working-directory: ./resume-builder
      env:
        CI: false
      run: npm test -- --watchAll=false --passWithNoTests

    - name: Build frontend
      working-directory: ./resume-builder
      env:
        CI: false
        REACT_APP_API_URL: https://resume-builder-m5ef.onrender.com
      run: npm run build

    - name: Deploy to Vercel
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: ./
        vercel-args: ${{ github.ref == 'refs/heads/main' && '--prod' || '--debug' }}
      env:
        CI: false
      continue-on-error: true

  # Health Check
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy-backend-render, deploy-frontend-vercel]
    if: always()

    steps:
    - name: Check backend health
      run: |
        # Wait for deployment to complete
        sleep 30
        
        # Check backend health endpoint (same backend for both environments)
        BACKEND_URL=https://resume-builder-m5ef.onrender.com
        echo "Checking backend health at: $BACKEND_URL"
        curl -f $BACKEND_URL/health || echo "Backend health check failed"

    - name: Check frontend health
      run: |
        # Wait for deployment to complete
        sleep 30
        
        # Check frontend availability
        FRONTEND_URL=${{ github.ref == 'refs/heads/main' && secrets.FRONTEND_URL_PROD || secrets.FRONTEND_URL_STAGING }}
        echo "Checking frontend health at: $FRONTEND_URL"
        curl -f $FRONTEND_URL || echo "Frontend health check failed"

  # Notify deployment status
  notify-deployment:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-backend-render, deploy-frontend-vercel, health-check]
    if: always()

    steps:
    - name: Notify Slack
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      if: always() 