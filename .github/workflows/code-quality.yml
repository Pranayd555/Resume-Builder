name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    # Backend Code Quality
    - name: Install backend dependencies
      working-directory: ./backend
      run: npm ci

    - name: Run backend linting
      working-directory: ./backend
      run: |
        # Install ESLint if not present
        npm install --save-dev eslint @typescript-eslint/parser @typescript-eslint/eslint-plugin
        npx eslint . --ext .js,.jsx,.ts,.tsx --format=checkstyle > eslint-backend.xml || echo "Linting completed with warnings"

    - name: Check backend code formatting
      working-directory: ./backend
      run: |
        # Install Prettier if not present
        npm install --save-dev prettier
        npx prettier --check . || echo "Code formatting issues found"

    - name: Run backend tests with coverage
      working-directory: ./backend
      env:
        NODE_ENV: test
        MONGODB_URI: mongodb://localhost:27017/test
        JWT_SECRET: test-secret
        JWT_REFRESH_SECRET: test-refresh-secret
      run: npm test -- --coverage --watchAll=false

    # Frontend Code Quality
    - name: Install frontend dependencies
      working-directory: ./resume-builder
      run: npm ci

    - name: Run frontend linting
      working-directory: ./resume-builder
      run: |
        # Install ESLint if not present
        npm install --save-dev eslint
        npx eslint src --ext .js,.jsx,.ts,.tsx --format=checkstyle > eslint-frontend.xml || echo "Linting completed with warnings"

    - name: Check frontend code formatting
      working-directory: ./resume-builder
      run: |
        # Install Prettier if not present
        npm install --save-dev prettier
        npx prettier --check src/ || echo "Code formatting issues found"

    - name: Run frontend tests with coverage
      working-directory: ./resume-builder
      run: npm test -- --coverage --watchAll=false --passWithNoTests

    # Upload coverage reports
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/coverage/lcov.info,./resume-builder/coverage/lcov.info
        flags: backend,frontend
        name: codecov-umbrella
        fail_ci_if_error: false

    # SonarCloud Analysis (optional - requires SonarCloud setup)
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=your-project-key
          -Dsonar.organization=your-organization
          -Dsonar.sources=backend,resume-builder/src
          -Dsonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,resume-builder/coverage/lcov.info 