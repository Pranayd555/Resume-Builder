name: 🚀 Main Pipeline

on:
  push:
    branches: [main, dev]
    paths-ignore: ['**.md', 'docs/**', '.gitignore']
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        type: choice
        options: [staging, production]
        default: staging
      skip_tests:
        description: 'Skip tests and deploy'
        type: boolean
        default: false

permissions:
  contents: read
  actions: read
  security-events: write
  pull-requests: write

env:
  NODE_VERSION: '18'

jobs:
  # Run CI for all triggers
  ci:
    name: 🧪 Continuous Integration
    uses: ./.github/workflows/ci-shared.yml
    with:
      run_security_scan: ${{ github.event_name == 'push' }}
      upload_coverage: true
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}

  # Backend Deployment - Only when backend code changes
  deploy-backend:
    name: 🚢 Deploy Backend
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🔍 Check for backend changes
        id: backend-changes
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Backend deployment forced via manual trigger"
            echo "backend-changed=true" >> $GITHUB_OUTPUT
          else
            # Check if any backend files were changed in the last commit
            BACKEND_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '^backend/' || echo "")
            if [ -n "$BACKEND_CHANGED" ]; then
              echo "Backend files changed:"
              echo "$BACKEND_CHANGED"
              echo "backend-changed=true" >> $GITHUB_OUTPUT
            else
              echo "No backend files changed"
              echo "backend-changed=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: 🟢 Setup Node.js
        if: steps.backend-changes.outputs.backend-changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: 🏗️ Build Backend
        if: steps.backend-changes.outputs.backend-changed == 'true'
        working-directory: ./backend
        env:
          NODE_ENV: production
          NPM_CONFIG_PREFER_OFFLINE: true
          NPM_CONFIG_NO_AUDIT: true
          NPM_CONFIG_NO_OPTIONAL: true
        run: |
          chmod +x render-build.sh
          ./render-build.sh
          echo "🚢 Backend build completed"

      - name: 🚀 Deploy to Render
        if: steps.backend-changes.outputs.backend-changed == 'true'
        run: |
          echo "🚀 Deploying backend to Render..."
          
          # Use Render API to trigger deployment
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "clearCache": "clear"
            }'
          
          echo "✅ Render deployment triggered"

      - name: ⏳ Wait for Render deployment
        if: steps.backend-changes.outputs.backend-changed == 'true'
        run: |
          echo "⏳ Waiting for Render deployment to complete..."
          sleep 120
          
          # Check deployment status
          BACKEND_BASE_URL="${{ github.ref == 'refs/heads/main' && 'https://resume-builder-m5ef.onrender.com' || 'https://resume-builder-m5ef.onrender.com' }}"
          
          for i in {1..10}; do
            echo "🔍 Checking backend health (attempt $i/10)"
            if curl -f -s "$BACKEND_BASE_URL/health" > /dev/null; then
              echo "✅ Backend is healthy!"
              exit 0
            fi
            sleep 30
          done
          
          echo "❌ Backend health check failed"
          exit 1

      - name: ⏭️ Skip backend deployment
        if: steps.backend-changes.outputs.backend-changed == 'false'
        run: |
          echo "⏭️ No backend changes detected - skipping deployment"
          echo "Backend deployment is only triggered when files in backend/ directory are modified"

      - name: 📄 Job Summary
        if: always()
        run: |
          if [ "${{ steps.backend-changes.outputs.backend-changed }}" == "true" ]; then
            echo "✅ Backend deployment attempted"
          else
            echo "⏭️ Backend deployment skipped (no changes detected)"
          fi

  # Frontend Deployment  
  deploy-frontend:
    name: 🎨 Deploy Frontend
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'resume-builder/package-lock.json'

      - name: 🏗️ Build Frontend
        working-directory: ./resume-builder
        env:
          CI: false
          REACT_APP_API_URL: ${{ github.ref == 'refs/heads/main' && secrets.PROD_API_URL || secrets.STAGING_API_URL }}
          GENERATE_SOURCEMAP: false
        run: |
          npm ci
          npm run build
          echo "🏗️ Frontend build completed"

      - name: 🚀 Deploy to Vercel
        id: vercel-deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./resume-builder
          vercel-args: ${{ github.ref == 'refs/heads/main' && '--prod' || '' }}
        env:
          CI: false
          REACT_APP_API_URL: ${{ github.ref == 'refs/heads/main' && secrets.PROD_API_URL || secrets.STAGING_API_URL }}

      - name: ✅ Verify Vercel Deployment
        run: |
          echo "🎉 Vercel deployment completed successfully!"
          echo "📍 Deployment URL: ${{ steps.vercel-deploy.outputs.preview-url }}"
          echo "🌐 Project URL: https://resume-builder-pranayd555-pranay-das-projects.vercel.app"
          
          # Use Vercel CLI to get deployment status (more reliable)
          npx vercel ls --token ${{ secrets.VERCEL_TOKEN }} --scope ${{ secrets.VERCEL_ORG_ID }} | head -5
          echo ""
          echo "✅ Deployment verification complete"



  # Summary
  summary:
    name: 📊 Summary
    runs-on: ubuntu-latest
    needs: [ci, deploy-backend, deploy-frontend]
    if: always()
    
    steps:
      - name: 📊 Pipeline Report
        run: |
          echo "🎯 Pipeline Summary"
          echo "=================="
          echo "Trigger: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}"
          echo ""
          echo "📋 Job Results:"
          echo "CI: ${{ needs.ci.result }}"
          echo "Backend Deploy: ${{ needs.deploy-backend.result }}"
          echo "Frontend Deploy: ${{ needs.deploy-frontend.result }}"
          echo ""
          
          # Determine overall status
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if [[ "${{ needs.ci.result }}" == "success" ]]; then
              echo "✅ PR is ready for review!"
            else
              echo "❌ PR has CI failures"
              exit 1
            fi
          else
            # Check if all required jobs succeeded
            BACKEND_SUCCESS="${{ needs.deploy-backend.result }}"
            FRONTEND_SUCCESS="${{ needs.deploy-frontend.result }}"
            CI_SUCCESS="${{ needs.ci.result }}"
            
            if [[ "$CI_SUCCESS" == "success" && ("$BACKEND_SUCCESS" == "success" || "$BACKEND_SUCCESS" == "skipped") && "$FRONTEND_SUCCESS" == "success" ]]; then
              echo "🎉 Deployment completed successfully!"
              if [[ "$BACKEND_SUCCESS" == "skipped" ]]; then
                echo "ℹ️  Backend deployment was skipped (no backend changes detected)"
              fi
            else
              echo "❌ Pipeline has failures"
              echo ""
              echo "🔧 Troubleshooting:"
              if [[ "$CI_SUCCESS" != "success" ]]; then
                echo "- Check CI job logs for test failures"
              fi
              if [[ "$BACKEND_SUCCESS" == "failure" ]]; then
                echo "- Check backend deployment logs"
                echo "- Verify RENDER_API_KEY and RENDER_SERVICE_ID secrets"
              fi
              if [[ "$FRONTEND_SUCCESS" != "success" ]]; then
                echo "- Check frontend deployment logs"  
                echo "- Verify VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID secrets"
              fi
              exit 1
            fi
          fi