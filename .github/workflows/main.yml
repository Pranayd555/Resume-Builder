name: 🚀 Main Pipeline

on:
  push:
    branches: [main, dev]
    paths-ignore: ['**.md', 'docs/**', '.gitignore']
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        type: choice
        options: [staging, production]
        default: staging
      skip_tests:
        description: 'Skip tests and deploy'
        type: boolean
        default: false

permissions:
  contents: read
  actions: read
  security-events: write
  pull-requests: write

env:
  NODE_VERSION: '18'

jobs:
  # Run CI for all triggers
  ci:
    name: 🧪 Continuous Integration
    uses: ./.github/workflows/ci-shared.yml
    with:
      run_security_scan: ${{ github.event_name == 'push' }}
      upload_coverage: true
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}

  # Backend Deployment (Disabled - Deploy manually via Render dashboard to avoid build limits)
  deploy-backend:
    name: 🚢 Deploy Backend
    runs-on: ubuntu-latest
    needs: ci
    if: false  # Temporarily disabled to avoid Render build limits
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: 🏗️ Build Backend
        working-directory: ./backend
        run: |
          npm ci --production
          echo "🚢 Backend build completed"

      - name: 🚀 Deploy to Render
        run: |
          echo "🚀 Deploying backend to Render..."
          
          # Use Render API to trigger deployment
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "clearCache": "clear"
            }'
          
          echo "✅ Render deployment triggered"

      - name: ⏳ Wait for Render deployment
        run: |
          echo "⏳ Waiting for Render deployment to complete..."
          sleep 120
          
          # Check deployment status
          BACKEND_BASE_URL="${{ github.ref == 'refs/heads/main' && 'https://resume-builder-m5ef.onrender.com' || 'https://resume-builder-m5ef.onrender.com' }}"
          
          for i in {1..10}; do
            echo "🔍 Checking backend health (attempt $i/10)"
            if curl -f -s "$BACKEND_BASE_URL/health" > /dev/null; then
              echo "✅ Backend is healthy!"
              exit 0
            fi
            sleep 30
          done
          
          echo "❌ Backend health check failed"
          exit 1

  # Frontend Deployment  
  deploy-frontend:
    name: 🎨 Deploy Frontend
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'resume-builder/package-lock.json'

      - name: 🏗️ Build Frontend
        working-directory: ./resume-builder
        env:
          CI: false
          REACT_APP_API_URL: ${{ github.ref == 'refs/heads/main' && secrets.PROD_API_URL || secrets.STAGING_API_URL }}
          GENERATE_SOURCEMAP: false
        run: |
          npm ci
          npm run build
          echo "🏗️ Frontend build completed"

      - name: 🚀 Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./resume-builder
          vercel-args: ${{ github.ref == 'refs/heads/main' && '--prod' || '' }}
        env:
          CI: false

      - name: ⏳ Wait for Vercel deployment
        run: |
          echo "⏳ Waiting for Vercel deployment to complete..."
          sleep 60
          
          # Check frontend deployment
          FRONTEND_URL="${{ github.ref == 'refs/heads/main' && secrets.FRONTEND_URL_PROD || secrets.FRONTEND_URL_STAGING }}"
          
          for i in {1..5}; do
            echo "🔍 Checking frontend (attempt $i/5)"
            if curl -f -s "$FRONTEND_URL" > /dev/null; then
              echo "✅ Frontend is accessible!"
              exit 0
            fi
            sleep 30
          done
          
          echo "❌ Frontend accessibility check failed"
          exit 1

  # Health Check
  health-check:
    name: 🩺 Health Check
    runs-on: ubuntu-latest
    needs: [deploy-frontend]  # deploy-backend temporarily disabled
    if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    
    steps:
      - name: 🔍 Comprehensive Health Check
        run: |
          echo "🩺 Running comprehensive health checks..."
          
          BACKEND_URL="${{ github.ref == 'refs/heads/main' && secrets.PROD_API_URL || secrets.STAGING_API_URL }}"
          FRONTEND_URL="${{ github.ref == 'refs/heads/main' && secrets.FRONTEND_URL_PROD || secrets.FRONTEND_URL_STAGING }}"
          
          # Backend health check
          echo "🔍 Backend: $BACKEND_URL/health"
          if curl -f -s "$BACKEND_URL/health"; then
            echo "✅ Backend is healthy"
            BACKEND_STATUS="✅ Healthy"
          else
            echo "❌ Backend health check failed"
            BACKEND_STATUS="❌ Failed"
          fi
          
          # Frontend health check
          echo "🔍 Frontend: $FRONTEND_URL"
          if curl -f -s "$FRONTEND_URL" > /dev/null; then
            echo "✅ Frontend is accessible"
            FRONTEND_STATUS="✅ Accessible"
          else
            echo "❌ Frontend accessibility check failed"
            FRONTEND_STATUS="❌ Failed"
          fi
          
          # Summary
          echo ""
          echo "🎯 Health Check Summary:"
          echo "Backend: $BACKEND_STATUS"
          echo "Frontend: $FRONTEND_STATUS"

  # Summary
  summary:
    name: 📊 Summary
    runs-on: ubuntu-latest
    needs: [ci, deploy-frontend, health-check]  # deploy-backend temporarily disabled
    if: always()
    
    steps:
      - name: 📊 Pipeline Report
        run: |
          echo "🎯 Pipeline Summary"
          echo "=================="
          echo "Trigger: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}"
          echo ""
          echo "📋 Job Results:"
          echo "CI: ${{ needs.ci.result }}"
          echo "Backend Deploy: ${{ needs.deploy-backend.result }}"  
          echo "Frontend Deploy: ${{ needs.deploy-frontend.result }}"
          echo "Health Check: ${{ needs.health-check.result }}"
          echo ""
          
          # Determine overall status
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if [[ "${{ needs.ci.result }}" == "success" ]]; then
              echo "✅ PR is ready for review!"
            else
              echo "❌ PR has CI failures"
              exit 1
            fi
          else
            if [[ "${{ needs.ci.result }}" == "success" && "${{ needs.deploy-backend.result }}" == "success" && "${{ needs.deploy-frontend.result }}" == "success" ]]; then
              echo "🎉 Deployment completed successfully!"
            else
              echo "❌ Pipeline has failures"
              echo ""
              echo "🔧 Troubleshooting:"
              if [[ "${{ needs.ci.result }}" != "success" ]]; then
                echo "- Check CI job logs for test failures"
              fi
              if [[ "${{ needs.deploy-backend.result }}" != "success" ]]; then
                echo "- Check backend deployment logs"
                echo "- Verify RENDER_API_KEY and RENDER_SERVICE_ID secrets"
              fi
              if [[ "${{ needs.deploy-frontend.result }}" != "success" ]]; then
                echo "- Check frontend deployment logs"  
                echo "- Verify VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID secrets"
              fi
              exit 1
            fi
          fi