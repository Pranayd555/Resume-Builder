name: 🔧 Manual Operations

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'Operation to perform'
        required: true
        type: choice
        options:
          - deploy
          - health-check
        default: deploy
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [staging, production]
        default: staging
      branch:
        description: 'Branch to deploy'
        required: false
        type: string
        default: dev
      reason:
        description: 'Reason for operation'
        required: false
        type: string

permissions:
  contents: read
  actions: read

env:
  NODE_VERSION: '18'

jobs:
  # Manual Deployment
  manual-deploy:
    name: 🚀 Manual Deploy
    runs-on: ubuntu-latest
    if: github.event.inputs.operation == 'deploy'
    environment: ${{ github.event.inputs.environment }}
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: ℹ️ Deployment Info
        run: |
          echo "🎯 Manual deployment initiated"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Branch: ${{ github.event.inputs.branch }}"
          echo "Reason: ${{ github.event.inputs.reason }}"

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Deploy backend
      - name: 🚢 Deploy Backend to Render
        run: |
          echo "🚀 Deploying backend to Render..."
          
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "clear"}'
            
          echo "✅ Render deployment triggered"

      # Deploy frontend
      - name: 🏗️ Build Frontend
        working-directory: ./resume-builder
        env:
          CI: false
          REACT_APP_API_URL: ${{ github.event.inputs.environment == 'production' && secrets.PROD_API_URL || secrets.STAGING_API_URL }}
          GENERATE_SOURCEMAP: false
        run: |
          npm ci
          npm run build

      - name: 🚀 Deploy Frontend to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./resume-builder
          vercel-args: ${{ github.event.inputs.environment == 'production' && '--prod' || '' }}
        env:
          CI: false

      - name: ✅ Deployment Complete
        run: |
          echo "🎉 Manual deployment completed!"
          echo "Backend: ${{ github.event.inputs.environment == 'production' && secrets.PROD_API_URL || secrets.STAGING_API_URL }}"
          echo "Frontend: ${{ github.event.inputs.environment == 'production' && secrets.FRONTEND_URL_PROD || secrets.FRONTEND_URL_STAGING }}"

  # Health Check Operation
  health-check:
    name: 🩺 Health Check
    runs-on: ubuntu-latest
    if: github.event.inputs.operation == 'health-check'
    
    steps:
      - name: 🔍 Check Services
        run: |
          echo "🩺 Running health checks for ${{ github.event.inputs.environment }} environment..."
          
          BACKEND_URL="${{ github.event.inputs.environment == 'production' && secrets.PROD_API_URL || secrets.STAGING_API_URL }}"
          FRONTEND_URL="${{ github.event.inputs.environment == 'production' && secrets.FRONTEND_URL_PROD || secrets.FRONTEND_URL_STAGING }}"
          
          echo "🔍 Backend: $BACKEND_URL/health"
          if curl -f -s "$BACKEND_URL/health"; then
            echo "✅ Backend is healthy"
            BACKEND_STATUS="✅ Healthy"
          else
            echo "❌ Backend health check failed"
            BACKEND_STATUS="❌ Failed"
          fi
          
          echo "🔍 Frontend: $FRONTEND_URL"
          if curl -f -s "$FRONTEND_URL" > /dev/null; then
            echo "✅ Frontend is accessible"
            FRONTEND_STATUS="✅ Accessible"
          else
            echo "❌ Frontend accessibility check failed"
            FRONTEND_STATUS="❌ Failed"
          fi
          
          echo ""
          echo "🎯 Health Check Results:"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Backend: $BACKEND_STATUS"
          echo "Frontend: $FRONTEND_STATUS"