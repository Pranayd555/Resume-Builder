name: 📦 Dependency Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Weekly on Monday at 9 AM UTC
  workflow_dispatch:
    inputs:
      update_dependencies:
        description: 'Auto-update dependencies'
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: '18'

jobs:
  dependency-audit:
    name: 🔍 Dependency Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🔍 Audit Backend Dependencies
        working-directory: ./backend
        run: |
          echo "🔍 Auditing backend dependencies..."
          npm audit --audit-level moderate || echo "Backend audit completed with warnings"

      - name: 🔍 Audit Frontend Dependencies
        working-directory: ./resume-builder
        run: |
          echo "🔍 Auditing frontend dependencies..."
          npm audit --audit-level moderate || echo "Frontend audit completed with warnings"

      - name: 📊 Dependency Summary
        run: |
          echo "📊 Dependency Audit Summary"
          echo "============================"
          echo "✅ Backend dependencies audited"
          echo "✅ Frontend dependencies audited"
          echo ""
          echo "ℹ️ Check individual job logs for detailed results"
          echo "ℹ️ Critical vulnerabilities should be addressed immediately" 