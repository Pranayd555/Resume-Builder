name: 📦 Dependency Check

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      update_dependencies:
        description: 'Auto-update dependencies'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '18'

jobs:
  dependency-audit:
    name: 🔍 Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🔍 Check backend dependencies
        working-directory: ./backend
        run: |
          echo "🔍 Checking backend dependencies..."
          npm audit --audit-level moderate || echo "Backend audit completed with warnings"
          npm outdated || echo "Some backend dependencies are outdated"

      - name: 🔍 Check frontend dependencies
        working-directory: ./resume-builder
        run: |
          echo "🔍 Checking frontend dependencies..."
          npm audit --audit-level moderate || echo "Frontend audit completed with warnings"
          npm outdated || echo "Some frontend dependencies are outdated"

      - name: 🔐 Security vulnerability check
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
        continue-on-error: true

  # Auto-update dependencies (optional)
  update-dependencies:
    name: 🔄 Update Dependencies
    runs-on: ubuntu-latest
    if: github.event.inputs.update_dependencies == 'true' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🔄 Update backend dependencies
        working-directory: ./backend
        run: |
          echo "🔄 Updating backend dependencies..."
          npm update
          npm audit fix --force || echo "Backend audit fix completed"

      - name: 🔄 Update frontend dependencies
        working-directory: ./resume-builder
        run: |
          echo "🔄 Updating frontend dependencies..."
          npm update
          npm audit fix --force || echo "Frontend audit fix completed"

      - name: 🔀 Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update dependencies'
          title: '📦 chore: update dependencies'
          body: |
            🤖 **Automated dependency updates**
            
            This PR updates dependencies to their latest compatible versions.
            
            ### Changes:
            - Updated backend dependencies
            - Updated frontend dependencies
            - Applied security fixes
            
            **⚠️ Please review and test thoroughly before merging!**
          branch: dependency-updates
          delete-branch: true

  # Dependency summary
  dependency-summary:
    name: 📊 Dependency Summary
    runs-on: ubuntu-latest
    needs: [dependency-audit]
    if: always()

    steps:
      - name: 📊 Summary
        run: |
          echo "📦 Dependency Check Summary:"
          echo "Audit Status: ${{ needs.dependency-audit.result }}"
          
          if [[ "${{ needs.dependency-audit.result }}" == "success" ]]; then
            echo "✅ Dependency audit completed successfully!"
          else
            echo "⚠️ Dependency audit found issues. Check logs for details."
          fi 